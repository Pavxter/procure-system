<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ============================================================
// API HELPER
// ============================================================
async function api(url, options = {}) {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...options.headers },
    credentials: 'same-origin',
    ...options,
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ============================================================
// TOAST
// ============================================================
let _toastCb = null;
function useToasts() {
  const [toasts, setToasts] = useState([]);
  _toastCb = useCallback((msg, type = 'ok') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }, []);
  return toasts;
}
function toast(msg, type) { _toastCb && _toastCb(msg, type); }

// ============================================================
// HELPERS
// ============================================================
function Stars({ value, max = 5, onClick }) {
  return (
    <span className={'stars' + (onClick ? ' clickable' : '')}>
      {Array.from({ length: max }, (_, i) => (
        <span key={i} className={'star ' + (i < value ? 'on' : 'off')}
          onClick={() => onClick && onClick(i + 1)}>★</span>
      ))}
    </span>
  );
}

function StatusBadge({ stanje, minimum }) {
  if (stanje === 0 || stanje < minimum * 0.5) return <span className="badge badge-danger">Kriticno</span>;
  if (stanje < minimum) return <span className="badge badge-warn">Nisko</span>;
  return <span className="badge badge-ok">OK</span>;
}

function NarudzbinaStatus({ status }) {
  const map = { naruceno: ['badge-blue','Naruceno'], cekanje: ['badge-warn','Cekanje'],
                isporuceno: ['badge-ok','Isporuceno'], otkazano: ['badge-gray','Otkazano'] };
  const [cls, lbl] = map[status] || ['badge-gray', status];
  return <span className={`badge ${cls}`}>{lbl}</span>;
}

function UgovorStatus({ status }) {
  const map = { potpisan: ['badge-ok','Potpisan'], u_pregovorima: ['badge-warn','U pregovorima'],
                nema_ugovor: ['badge-danger','Nema ugovora'], istekao: ['badge-gray','Istekao'] };
  const [cls, lbl] = map[status] || ['badge-gray', status];
  return <span className={`badge ${cls}`}>{lbl}</span>;
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('sr-RS');
}

function fmtNum(n) {
  if (n == null) return '—';
  return parseFloat(n).toLocaleString('sr-RS');
}

function csvExport(rows, cols, filename) {
  const BOM = '\uFEFF';
  const header = cols.map(c => c.label).join(';');
  const body = rows.map(r => cols.map(c => {
    const v = c.fn ? c.fn(r) : (r[c.key] ?? '');
    return `"${String(v).replace(/"/g, '""')}"`;
  }).join(';')).join('\n');
  const blob = new Blob([BOM + header + '\n' + body], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// ============================================================
// CONFIRM MODAL
// ============================================================
function ConfirmModal({ msg, onOk, onCancel }) {
  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" style={{maxWidth:380}} onClick={e => e.stopPropagation()}>
        <div className="modal-head"><h3>Potvrda</h3><button className="modal-close" onClick={onCancel}>×</button></div>
        <div className="modal-body"><p style={{fontSize:14}}>{msg}</p></div>
        <div className="modal-foot">
          <button className="btn btn-secondary" onClick={onCancel}>Otkaži</button>
          <button className="btn btn-danger" onClick={onOk}>Obriši</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// DASHBOARD
// ============================================================
function Dashboard({ user }) {
  const [stats, setStats] = useState(null);
  const [log, setLog] = useState([]);

  async function load() {
    try {
      const [s, l] = await Promise.all([
        api('api/data.php?entity=stats'),
        api('api/data.php?entity=activity_log&limit=15'),
      ]);
      setStats(s);
      setLog(l);
    } catch(e) { toast(e.message, 'err'); }
  }

  useEffect(() => { load(); }, []);

  if (!stats) return <div className="page"><p>Ucitavanje...</p></div>;

  return (
    <div className="page">
      <div className="stats-grid">
        <div className="stat-card">
          <div className="val">{stats.totalSirovine}</div>
          <div className="lbl">Ukupno sirovina</div>
        </div>
        <div className={'stat-card ' + (stats.kriticneSirovine > 0 ? 'danger' : 'ok')}>
          <div className="val">{stats.kriticneSirovine}</div>
          <div className="lbl">Kriticne sirovine</div>
        </div>
        <div className={'stat-card ' + (stats.aktivneNarudzbine > 0 ? 'warn' : '')}>
          <div className="val">{stats.aktivneNarudzbine}</div>
          <div className="lbl">Aktivne narudzbine</div>
        </div>
        <div className="stat-card">
          <div className="val">{stats.totalDobavljaci}</div>
          <div className="lbl">Dobavljaci</div>
        </div>
        <div className={'stat-card ' + (stats.potpisaniUgovori < stats.totalUgovori ? 'warn' : 'ok')}>
          <div className="val">{stats.potpisaniUgovori}<span style={{fontSize:16,opacity:.5}}>/{stats.totalUgovori}</span></div>
          <div className="lbl">Potpisani ugovori</div>
        </div>
      </div>

      <div className="section" style={{marginBottom:20}}>
        <div className="section-head">
          <h3>Kriticne sirovine</h3>
          <button className="btn btn-secondary" onClick={load}>Osvezi</button>
        </div>
        {stats.kriticneDetalji.length === 0
          ? <div className="empty"><div className="empty-icon">✅</div><p>Nema kriticnih sirovina</p></div>
          : <div className="table-wrap">
              <table>
                <thead><tr>
                  <th>Naziv</th><th>Kategorija</th><th>Stanje</th><th>Minimum</th><th>JM</th><th>Dobavljac</th><th>Status</th>
                </tr></thead>
                <tbody>
                  {stats.kriticneDetalji.map(s => (
                    <tr key={s.id}>
                      <td style={{fontWeight:600}}>{s.naziv}</td>
                      <td>{s.kategorija || '—'}</td>
                      <td style={{fontWeight:700,color:s.nivo==='kriticno'?'#dc2626':'#d97706'}}>{fmtNum(s.stanje)}</td>
                      <td>{fmtNum(s.minimum)}</td>
                      <td>{s.jm}</td>
                      <td>{s.dobavljac_naziv || '—'}</td>
                      <td><span className={'badge ' + (s.nivo==='kriticno'?'badge-danger':'badge-warn')}>{s.nivo==='kriticno'?'Kriticno':'Nisko'}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
        }
      </div>

      <div className="section">
        <div className="section-head"><h3>Poslednje aktivnosti</h3></div>
        <div className="activity-list">
          {log.length === 0 && <div className="empty"><p>Nema aktivnosti</p></div>}
          {log.map(l => (
            <div key={l.id} className="activity-item">
              <span className={'activity-dot ' + l.akcija}></span>
              <span style={{fontWeight:600}}>{l.korisnik}</span>
              <span style={{color:'#6b7280'}}>{l.akcija}</span>
              <span>{l.detalji}</span>
              <span className="activity-time">{new Date(l.created_at).toLocaleString('sr-RS')}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// SIROVINE
// ============================================================
const JM_OPTIONS = ['kg','g','L','mL','kom','m','m2','m3','t'];

// ============================================================
// UPRAVLJANJE KATEGORIJAMA
// ============================================================
function KategorijeModal({ user, onClose, onChange }) {
  const [kategorije, setKategorije] = useState([]);
  const [novi, setNovi] = useState('');
  const [saving, setSaving] = useState(false);
  const canDelete = user.uloga === 'admin';

  async function load() {
    try { setKategorije(await api('api/data.php?entity=kategorije')); }
    catch(e) { toast(e.message, 'err'); }
  }

  useEffect(() => { load(); }, []);

  async function dodaj(e) {
    e.preventDefault();
    if (!novi.trim()) return;
    setSaving(true);
    try {

const IMPORT_COLS = ['naziv','kategorija','jm','stanje','minimum','cena','napomena'];

function parseCSV(text) {
  // Ukloni BOM
  text = text.replace(/^\uFEFF/, '');
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return { error: 'Fajl je prazan ili nema podataka.' };

  // Auto-detect separator (; ili ,)
  const sep = lines[0].includes(';') ? ';' : ',';

  function splitLine(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === sep && !inQ) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  }

  const headers = splitLine(lines[0]).map(h => h.toLowerCase().replace(/[^a-z_]/g,''));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitLine(lines[i]);
    if (vals.every(v => !v)) continue;
    const row = {};
    headers.forEach((h, idx) => { row[h] = vals[idx] || ''; });
    rows.push(row);
  }
  return { headers, rows };
}

function downloadTemplate() {
  const BOM = '\uFEFF';
  const header = 'naziv;kategorija;jm;stanje;minimum;cena;napomena';
  const example = 'Natrijum hidroksid;Hemikalije;kg;150;100;85;Test napomena';
  const blob = new Blob([BOM + header + '\n' + example], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'template_sirovine.csv';
  a.click();
}

function ImportModal({ dobavljaci, onImported, onClose }) {
  const [parsed, setParsed] = useState(null);
  const [error, setError] = useState('');
  const [progress, setProgress] = useState(null); // null | { done, total, errors }
  const [done, setDone] = useState(false);

  function onFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const result = parseCSV(ev.target.result);
      if (result.error) { setError(result.error); setParsed(null); return; }
      if (!result.rows.some(r => r.naziv)) { setError('Kolona "naziv" nije pronadjena ili je prazna. Proveri format.'); setParsed(null); return; }
      setError('');
      setParsed(result);
    };
    reader.readAsText(file, 'UTF-8');
  }

  async function doImport() {
    if (!parsed) return;
    const valid = parsed.rows.filter(r => r.naziv && r.naziv.trim());
    setProgress({ done: 0, total: valid.length, errors: [] });
    let errors = [];
    let imported = [];
    for (let i = 0; i < valid.length; i++) {
      const r = valid[i];
      try {
        const saved = await api('api/data.php?entity=sirovine', {
          method: 'POST',
          body: {
            naziv: r.naziv.trim(),
            kategorija: r.kategorija || '',
            jm: r.jm || 'kg',
            stanje: parseFloat(r.stanje) || 0,
            minimum: parseFloat(r.minimum) || 0,
            cena: parseFloat(r.cena) || 0,
            napomena: r.napomena || '',
          }
        });
        imported.push(saved);
      } catch(e) {
        errors.push(`Red ${i+2}: ${r.naziv} — ${e.message}`);
      }
      setProgress({ done: i + 1, total: valid.length, errors });
    }
    setDone(true);
    onImported(imported);
    toast(`Uvezeno ${imported.length} sirovina${errors.length ? ', ' + errors.length + ' gresaka' : ''}.`, errors.length ? 'err' : 'ok');
  }

  const valid = parsed ? parsed.rows.filter(r => r.naziv && r.naziv.trim()) : [];

  return (
    <div className="modal-overlay" onClick={done ? onClose : undefined}>
      <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h3>Uvoz sirovina iz CSV</h3>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {!progress && <>
            <div style={{background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:8,padding:'12px 14px',marginBottom:16,fontSize:13}}>
              <b>Ocekivane kolone:</b> naziv, kategorija, jm, stanje, minimum, cena, napomena<br/>
              <b>Separator:</b> ; (tacka-zarez) ili , (zarez) — auto-detect<br/>
              <b>Kodovanje:</b> UTF-8 (sacuvaj iz Excela kao "CSV UTF-8")<br/>
              <button className="btn btn-secondary" style={{marginTop:8}} onClick={downloadTemplate}>Preuzmi template</button>
            </div>
            <div className="field">
              <label>Izaberi CSV fajl</label>
              <input type="file" accept=".csv,text/csv" onChange={onFile} style={{padding:'8px 0'}} />
            </div>
            {error && <div style={{background:'#fee2e2',color:'#991b1b',borderRadius:8,padding:'10px 14px',fontSize:13}}>{error}</div>}
            {parsed && valid.length > 0 && <>
              <div style={{fontSize:13,color:'#065f46',background:'#d1fae5',borderRadius:8,padding:'8px 14px',marginBottom:12}}>
                Pronadjeno <b>{valid.length}</b> validnih redova za uvoz{parsed.rows.length > valid.length ? ` (${parsed.rows.length - valid.length} preskoceno — bez naziva)` : ''}.
              </div>
              <div style={{overflowX:'auto',maxHeight:260,overflowY:'auto',border:'1px solid #e5e7eb',borderRadius:8}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead style={{position:'sticky',top:0,background:'#f9fafb'}}>
                    <tr>{['naziv','kategorija','jm','stanje','minimum','cena','napomena'].map(c => <th key={c} style={{padding:'8px 10px',textAlign:'left',borderBottom:'1px solid #e5e7eb',fontWeight:700,color:'#374151'}}>{c}</th>)}</tr>
                  </thead>
                  <tbody>
                    {valid.slice(0,50).map((r, i) => (
                      <tr key={i} style={{borderBottom:'1px solid #f3f4f6'}}>
                        <td style={{padding:'6px 10px',fontWeight:600}}>{r.naziv}</td>
                        <td style={{padding:'6px 10px'}}>{r.kategorija||'—'}</td>
                        <td style={{padding:'6px 10px'}}>{r.jm||'kg'}</td>
                        <td style={{padding:'6px 10px'}}>{r.stanje||0}</td>
                        <td style={{padding:'6px 10px'}}>{r.minimum||0}</td>
                        <td style={{padding:'6px 10px'}}>{r.cena||0}</td>
                        <td style={{padding:'6px 10px',color:'#6b7280'}}>{r.napomena||''}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {valid.length > 50 && <p style={{fontSize:12,color:'#6b7280',marginTop:6}}>Prikazano prvih 50 od {valid.length} redova.</p>}
            </>}
          </>}
          {progress && <>
            <div style={{marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:6}}>
                <span>Uvoz u toku...</span>
                <span style={{fontWeight:700}}>{progress.done}/{progress.total}</span>
              </div>
              <div style={{background:'#e5e7eb',borderRadius:20,height:8}}>
                <div style={{background:'#0f3460',borderRadius:20,height:8,width:`${Math.round(progress.done/progress.total*100)}%`,transition:'width .2s'}} />
              </div>
            </div>
            {done && <>
              <div style={{fontSize:13,color:'#065f46',background:'#d1fae5',borderRadius:8,padding:'10px 14px',marginBottom:progress.errors.length?12:0}}>
                Uvezeno <b>{progress.done - progress.errors.length}</b> sirovina.
              </div>
              {progress.errors.length > 0 && <div style={{fontSize:12,color:'#991b1b',background:'#fee2e2',borderRadius:8,padding:'10px 14px',marginTop:8}}>
                <b>Greske ({progress.errors.length}):</b>
                {progress.errors.map((e,i) => <div key={i}>{e}</div>)}
              </div>}
            </>}
          </>}
        </div>
        <div className="modal-foot">
          <button className="btn btn-secondary" onClick={onClose}>{done ? 'Zatvori' : 'Otkaži'}</button>
          {!progress && parsed && valid.length > 0 && (
            <button className="btn btn-primary" onClick={doImport}>Uvezi {valid.length} sirovina</button>
          )}
        </div>
      </div>
    </div>
  );
}

  const [importModal, setImportModal] = useState(false);
  const [katModal, setKatModal] = useState(false);
  const canEdit = user.uloga !== 'viewer';

  async function load() {
    try {
      const [r, d, k] = await Promise.all([
        api(`api/data.php?entity=sirovine${search ? '&search=' + encodeURIComponent(search) : ''}${kat ? '&kategorija=' + encodeURIComponent(kat) : ''}`),
        api('api/data.php?entity=dobavljaci'),

const OCENA_KRIT = [
  { key:'ocena_kvalitet', lbl:'Kvalitet' },
  { key:'ocena_cena',     lbl:'Cena' },
  { key:'ocena_rokovi',   lbl:'Rokovi' },
  { key:'ocena_placanje', lbl:'Placanje' },
  { key:'ocena_reklamacije', lbl:'Reklamacije' },
];

function RadarChart({ values }) {
  const n = values.length;
  const cx = 60, cy = 60, r = 48;
  function point(i, val) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const rr = r * val / 5;
    return [cx + rr * Math.cos(angle), cy + rr * Math.sin(angle)];
  }
  const pts = values.map((v, i) => point(i, v));
  const polygon = pts.map(p => p.join(',')).join(' ');
  const axes = values.map((_, i) => { const p = point(i, 5); return <line key={i} x1={cx} y1={cy} x2={p[0]} y2={p[1]} stroke="#e5e7eb" strokeWidth="1" />; });
  return (
    <svg className="radar-wrap" viewBox="0 0 120 120">
      {[1,2,3,4,5].map(lvl => {
        const ps = values.map((_, i) => point(i, lvl));
        return <polygon key={lvl} points={ps.map(p => p.join(',')).join(' ')} fill="none" stroke="#e5e7eb" strokeWidth="0.5" />;
      })}
      {axes}
      <polygon points={polygon} fill="rgba(15,52,96,0.15)" stroke="#0f3460" strokeWidth="1.5" />
    </svg>
  );
}

function DobavljacModal({ item, onSave, onClose }) {
  const init = {
    naziv: item?.naziv || '',
    pib: item?.pib || '',
    kontakt_osoba: item?.kontakt_osoba || '',

    ocena_placanje: item?.ocena_placanje ?? 3,
    ocena_reklamacije: item?.ocena_reklamacije ?? 3,
  };
  const [form, setForm] = useState(init);
  const [saving, setSaving] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const avgOcena = Math.round(OCENA_KRIT.reduce((s, k) => s + parseInt(form[k.key] || 3), 0) / OCENA_KRIT.length);

function KontrolingField({ oblast, polje, initialValue, canEdit }) {
  const [val, setVal] = useState(initialValue || '');

  const timerRef = useRef(null);

  async function save(newVal) {
    setState('saving');
    try {
      await api('api/data.php?entity=kontroling', {
        method: 'POST',
        body: { oblast, polje, vrednost: newVal },
      });
      setState('saved');
      setTimeout(() => setState(''), 2000);
    } catch(e) {
      toast(e.message, 'err');

  function onBlur() {
    if (!canEdit) return;
    save(val);

  return (

      <textarea
        value={val}
        disabled={!canEdit}
        onChange={e => setVal(e.target.value)}

        className={state === 'saving' ? 'saving' : state === 'saved' ? 'saved' : ''}
        placeholder={canEdit ? 'Unesi...' : ''}

const MESECI = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Avg','Sep','Okt','Nov','Dec'];

function PlanNabavke({ user }) {
  const [rows, setRows] = useState([]);
  const [sirovine, setSirovine] = useState([]);
  const [godina, setGodina] = useState(new Date().getFullYear());
  const [kat, setKat] = useState('');
  const [showBudzet, setShowBudzet] = useState(false);
  const canEdit = user.uloga !== 'viewer';
  const savingRef = useRef({});

  async function load() {
    try {
      const [r, s] = await Promise.all([
        api(`api/data.php?entity=plan_nabavke&godina=${godina}${kat ? '&kategorija='+encodeURIComponent(kat) : ''}`),
        api('api/data.php?entity=sirovine'),
      ]);
      setSirovine(s);
      // Sve sirovine prikazujemo, sa planom ili bez
      const planMap = {};
      r.forEach(p => planMap[p.sirovina_id] = p);
      const display = s
        .filter(s => !kat || s.kategorija === kat)
        .map(s => planMap[s.id] || { sirovina_id: s.id, sirovina_naziv: s.naziv, jm: s.jm, kategorija: s.kategorija, godina });
      setRows(display);
    } catch(e) { toast(e.message, 'err'); }
  }

  useEffect(() => { load(); }, [godina, kat]);

  const timerRef = useRef({});

  function onChange(sirovinaId, field, value) {
    setRows(prev => prev.map(r => r.sirovina_id === sirovinaId ? { ...r, [field]: value } : r));
    const key = `${sirovinaId}_${field}`;
    clearTimeout(timerRef.current[key]);
    timerRef.current[key] = setTimeout(() => saveRow(sirovinaId), 800);
  }

  async function saveRow(sirovinaId) {
    const row = rows.find(r => r.sirovina_id === sirovinaId);
    if (!row) return;
    const payload = { sirovinaId, godina };
    for (let m = 1; m <= 12; m++) {
      payload[`mesec_${m}`] = parseFloat(row[`mesec_${m}`]) || 0;
      payload[`budzet_${m}`] = parseFloat(row[`budzet_${m}`]) || 0;
    }
    try {
      await api('api/data.php?entity=plan_nabavke', { method:'POST', body: payload });
    } catch(e) { toast(e.message, 'err'); }
  }

  function totalPlan(row) {
    return Array.from({ length: 12 }, (_, i) => parseFloat(row[`mesec_${i+1}`]) || 0).reduce((a, b) => a + b, 0);
  }
  function totalReal(row) {
    return Array.from({ length: 12 }, (_, i) => parseFloat(row[`real_${i+1}`]) || 0).reduce((a, b) => a + b, 0);
  }

  function doExport() {
    const cols = [
      { key:'sirovina_naziv', label:'Sirovina' },
      { key:'kategorija', label:'Kategorija' },
      { key:'jm', label:'JM' },
      ...MESECI.map((m, i) => ({ key:`mesec_${i+1}`, label:`Plan ${m}` })),
      ...MESECI.map((m, i) => ({ key:`real_${i+1}`, label:`Real ${m}` })),
      { label:'Plan Ukupno', fn: r => totalPlan(r) },
      { label:'Real Ukupno', fn: r => totalReal(r) },
    ];
    csvExport(rows, cols, `plan_nabavke_${godina}.csv`);
  }

  const years = [2024, 2025, 2026, 2027];
  const kategorije = [...new Set(sirovine.map(s => s.kategorija).filter(Boolean))];

  return (
    <div className="page">
      <div className="section">
        <div className="section-head">
          <h3>Plan nabavke</h3>
          <div className="section-actions">
            <select className="year-sel" value={godina} onChange={e => setGodina(parseInt(e.target.value))}>
              {years.map(y => <option key={y}>{y}</option>)}
            </select>
            <select className="filter-sel" value={kat} onChange={e => setKat(e.target.value)}>
              <option value="">Sve kategorije</option>
              {kategorije.map(k => <option key={k}>{k}</option>)}
            </select>
            <button className="btn btn-secondary" onClick={() => setShowBudzet(!showBudzet)}>
              {showBudzet ? 'Kolicine' : 'Budzet'}
            </button>
            <button className="btn btn-secondary" onClick={doExport}>CSV</button>
          </div>
        </div>
        <div className="plan-table-wrap">
          <table className="plan-table">
            <thead>
              <tr>
                <th style={{minWidth:160}}>Sirovina</th>
                <th>JM</th>
                {MESECI.map((m, i) => <th key={i}>{m}</th>)}
                <th>Ukupno</th>
                <th>Realizovano</th>
                <th>%</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(row => {
                const tp = totalPlan(row);
                const tr2 = totalReal(row);
                const pct = tp > 0 ? Math.round(tr2 / tp * 100) : null;
                return (
                  <tr key={row.sirovina_id}>
                    <td style={{fontWeight:600,fontSize:12}}>{row.sirovina_naziv}</td>
                    <td style={{fontSize:11,color:'#6b7280'}}>{row.jm}</td>
                    {Array.from({length:12}, (_, i) => {
                      const planKey = `mesec_${i+1}`;
                      const budKey = `budzet_${i+1}`;
                      const realKey = `real_${i+1}`;
                      const fk = showBudzet ? budKey : planKey;
                      const realVal = parseFloat(row[realKey]) || 0;
                      return (
                        <td key={i}>
                          <div className="plan-input-wrap">
                            {canEdit
                              ? <input type="number" step="0.01" min="0"
                                  value={row[fk] || ''}
                                  onChange={e => onChange(row.sirovina_id, fk, e.target.value)}
                                  placeholder="0"
                                />
                              : <span style={{fontSize:12}}>{fmtNum(row[fk] || 0)}</span>
                            }
                            {!showBudzet && realVal > 0 && <span className="plan-real">{fmtNum(realVal)}</span>}
                          </div>
                        </td>
                      );
                    })}
                    <td style={{fontWeight:700,fontSize:12}}>{fmtNum(tp)}</td>
                    <td style={{fontWeight:700,fontSize:12,color:'#059669'}}>{fmtNum(tr2)}</td>
                    <td>{pct !== null
                      ? <span className={'plan-pct ' + (pct >= 100 ? 'over' : 'under')}>{pct}%</span>
                      : <span style={{color:'#9ca3af'}}>—</span>
                    }</td>
                  </tr>
                );
              })}
              {rows.length === 0 && <tr><td colSpan={16} style={{textAlign:'center',color:'#9ca3af',padding:'32px'}}>Nema podataka</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function UgovorModal({ item, dobavljaci, existingDobavljaciIds, onSave, onClose }) {
  const [form, setForm] = useState({
    dobavljacId: item?.dobavljac_id || '',
    status: item?.status || 'nema_ugovor',
    datum_potpisa: item?.datum_potpisa || '',
    datum_isteka: item?.datum_isteka || '',
    rok_placanja: item?.rok_placanja || '',
    rabat: item?.rabat || '',
    min_kolicina: item?.min_kolicina || '',
    prioritet: item?.prioritet ?? 2,
    napomena: item?.napomena || '',
  });
  const [saving, setSaving] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const avail = dobavljaci.filter(d => !existingDobavljaciIds.includes(d.id) || d.id === item?.dobavljac_id);

  async function submit(e) {
    e.preventDefault();
    if (!item && !form.dobavljacId) { toast('Izaberi dobavljaca', 'err'); return; }

    try {
      let r;
      if (item) {
        r = await api(`api/data.php?entity=plan_ugovora&id=${item.id}`, { method:'PUT', body: form });
      } else {
        r = await api('api/data.php?entity=plan_ugovora', { method:'POST', body: form });
      }
      onSave(r);
      toast(item ? 'Ugovor azuriran' : 'Ugovor dodat');
      onClose();
    } catch(e) { toast(e.message, 'err'); } finally { setSaving(false); }
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h3>{item ? 'Izmeni ugovor' : 'Dodaj ugovor'}</h3>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <form onSubmit={submit}>
          <div className="modal-body">
            {!item && <div className="field"><label>Dobavljac *</label>
              <select value={form.dobavljacId} onChange={e => set('dobavljacId', e.target.value)}>
                <option value="">— Izaberi —</option>
                {avail.map(d => <option key={d.id} value={d.id}>{d.naziv}</option>)}

            </div>}
            <div className="field-row">
              <div className="field"><label>Status</label>

                  <option value="u_pregovorima">U pregovorima</option>
                  <option value="potpisan">Potpisan</option>
                  <option value="istekao">Istekao</option>

              </div>

function PlanUgovora({ user }) {
  const [rows, setRows] = useState([]);
  const [dobavljaci, setDobavljaci] = useState([]);
  const [statusFilter, setStatusFilter] = useState('');
  const [modal, setModal] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const canEdit = user.uloga !== 'viewer';

  async function load() {
    try {
      const [r, d] = await Promise.all([
        api(`api/data.php?entity=plan_ugovora${statusFilter ? '&status='+statusFilter : ''}`),
        api('api/data.php?entity=dobavljaci'),
      ]);
      setRows(r); setDobavljaci(d);
    } catch(e) { toast(e.message, 'err'); }
  }

  useEffect(() => { load(); }, [statusFilter]);

  function onSave(saved) {
    setRows(prev => {
      const idx = prev.findIndex(r => r.id === saved.id);
      if (idx >= 0) { const n = [...prev]; n[idx] = saved; return n; }
      return [saved, ...prev];
    });
  }

  async function doDelete(id) {
    try {
      await api(`api/data.php?entity=plan_ugovora&id=${id}`, { method:'DELETE' });
      setRows(r => r.filter(x => x.id !== id));
      toast('Ugovor obrisan');
    } catch(e) { toast(e.message, 'err'); }
    setConfirm(null);
  }

  function doExport() {
    csvExport(rows, [
      { key:'dobavljac_naziv', label:'Dobavljac' },
      { key:'status', label:'Status' },
      { key:'datum_potpisa', label:'Datum potpisa' },
      { key:'datum_isteka', label:'Datum isteka' },
      { key:'rok_placanja', label:'Rok placanja' },
      { key:'rabat', label:'Rabat' },
      { key:'min_kolicina', label:'Min kolicina' },
      { key:'prioritet', label:'Prioritet' },
      { key:'napomena', label:'Napomena' },
    ], 'plan_ugovora.csv');
  }

  const prioLabel = { 1: 'Nizak', 2: 'Srednji', 3: 'Visok' };
  const existingIds = rows.map(r => r.dobavljac_id);

  return (
    <div className="page">
      <div className="section-head" style={{background:'#fff',borderRadius:12,padding:'16px 20px',marginBottom:16,boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
        <h3 style={{fontSize:15,fontWeight:700}}>Plan ugovora ({rows.length})</h3>
        <div className="section-actions">
          <select className="filter-sel" value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
            <option value="">Svi statusi</option>
            <option value="potpisan">Potpisan</option>
            <option value="u_pregovorima">U pregovorima</option>
            <option value="nema_ugovor">Nema ugovora</option>
            <option value="istekao">Istekao</option>
          </select>
          <button className="btn btn-secondary" onClick={doExport}>CSV</button>
          {canEdit && <button className="btn btn-primary" onClick={() => setModal('add')}>+ Dodaj</button>}
        </div>
      </div>
      {rows.length === 0
        ? <div className="empty"><div className="empty-icon">📄</div><p>Nema ugovora</p></div>
        : <div className="cards-grid">
            {rows.map(r => (
              <div key={r.id} className={'card status-' + r.status}>
                <div className="card-head">
                  <div>
                    <div className="card-title">{r.dobavljac_naziv}</div>
                    <div className="card-sub">{r.kontakt_osoba || '—'}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <UgovorStatus status={r.status} />
                    <div style={{fontSize:11,marginTop:4}} className={'prio-'+r.prioritet}>
                      Prioritet: {prioLabel[r.prioritet] || r.prioritet}
                    </div>
                  </div>
                </div>
                <div className="card-info">
                  {r.datum_potpisa && <div><b>Potpisan:</b> {fmtDate(r.datum_potpisa)}</div>}
                  {r.datum_isteka && <div><b>Istice:</b> {fmtDate(r.datum_isteka)}</div>}
                  {r.rok_placanja && <div><b>Rok placanja:</b> {r.rok_placanja}</div>}
                  {r.rabat && <div><b>Rabat:</b> {r.rabat}</div>}
                  {r.min_kolicina && <div><b>Min. kolicina:</b> {r.min_kolicina}</div>}
                  {r.napomena && <div><b>Napomena:</b> {r.napomena}</div>}
                </div>
                {canEdit && (
                  <div className="card-foot">
                    <Stars value={parseInt(r.ocena || 3)} />
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn btn-secondary" style={{padding:'5px 10px'}} onClick={() => setModal(r)}>Izmeni</button>
                      <button className="btn btn-danger" style={{padding:'5px 10px'}} onClick={() => setConfirm(r)}>Briši</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
      }
      {modal && <UgovorModal item={modal === 'add' ? null : modal} dobavljaci={dobavljaci} existingDobavljaciIds={existingIds} onSave={onSave} onClose={() => setModal(null)} />}
      {confirm && <ConfirmModal msg={`Obrisati ugovor za "${confirm.dobavljac_naziv}"?`} onOk={() => doDelete(confirm.id)} onCancel={() => setConfirm(null)} />}
    </div>
  );
}

function ChangePassword({ onClose }) {
  const [form, setForm] = useState({ oldPassword:'', newPassword:'', confirm:'' });
  const [saving, setSaving] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  async function submit(e) {
    e.preventDefault();
    if (form.newPassword !== form.confirm) { toast('Lozinke se ne poklapaju', 'err'); return; }
    if (form.newPassword.length < 6) { toast('Lozinka mora imati min. 6 karaktera', 'err'); return; }
    setSaving(true);
    try {
      await api('api/auth.php?action=change-password', { method:'POST', body: { oldPassword: form.oldPassword, newPassword: form.newPassword } });
      toast('Lozinka promenjena');
      onClose();
    } catch(e) { toast(e.message, 'err'); } finally { setSaving(false); }
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:380}} onClick={e => e.stopPropagation()}>
        <div className="modal-head"><h3>Promeni lozinku</h3><button className="modal-close" onClick={onClose}>×</button></div>
        <form onSubmit={submit}>
          <div className="modal-body">
            <div className="field"><label>Stara lozinka</label><input type="password" value={form.oldPassword} onChange={e => set('oldPassword', e.target.value)} autoFocus /></div>
            <div className="field"><label>Nova lozinka</label><input type="password" value={form.newPassword} onChange={e => set('newPassword', e.target.value)} /></div>
            <div className="field"><label>Potvrdi novu lozinku</label><input type="password" value={form.confirm} onChange={e => set('confirm', e.target.value)} /></div>
          </div>
          <div className="modal-foot">
            <button type="button" className="btn btn-secondary" onClick={onClose}>Otkaži</button>
            <button type="submit" className="btn btn-primary" disabled={saving}>{saving ? 'Menjanje...' : 'Promeni'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

  const [form, setForm] = useState({ username:'', password:'' });

  const [loading, setLoading] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  async function submit(e) {
    e.preventDefault();
    setErr(''); setLoading(true);
    try {
      const user = await api('api/auth.php?action=login', { method:'POST', body: form });

    } catch(e) {

          </div>
          <div className="form-group">
            <label>Lozinka</label>
            <input type="password" value={form.password} onChange={e => set('password', e.target.value)} autoComplete="current-password" />

        </form>
      </div>
    </div>
  );
}

          </div>
        </div>

          </div>
          <button className="btn btn-logout" onClick={logout}>Odjava</button>
        </div>
      </header>
      <div className="tabs-bar">
        {tabs.map(t => (
          <button key={t.id} className={'tab-btn' + (tab === t.id ? ' active' : '')} onClick={() => setTab(t.id)}>

      {tab === 'dashboard'   && <Dashboard user={user} />}
      {tab === 'sirovine'    && <Sirovine user={user} />}
      {tab === 'dobavljaci'  && <Dobavljaci user={user} />}
      {tab === 'narudzbine'  && <Narudzbine user={user} />}
      {tab === 'kontroling'  && <Kontroling user={user} />}
      {tab === 'plan'        && <PlanNabavke user={user} />}
      {tab === 'ugovori'     && <PlanUgovora user={user} />}
      {tab === 'korisnici'   && <Korisnici user={user} />}
      {changePwd && <ChangePassword onClose={() => setChangePwd(false)} />}
      <div className="toast-container">{toasts.map(t => <div key={t.id} className={'toast ' + t.type}>{t.msg}</div>)}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
